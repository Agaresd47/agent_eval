gold_task_goal: '对每个病人目录，从 ct.nii.gz 提取 affine，做 QR 分解 + 符号修正得到 cleaned affine，

  把 cleaned affine 写回该目录下所有非 CT 的 .nii.gz 文件（覆盖 affine，保留 data）。

  '
gold_constraints:
- QR 清理流程：normalize R 矩阵 → QR 分解取 Q → Q × 原 spacing 重建 R
- 符号修正：用原 ct affine 的 sign 矩阵覆盖 cleaned affine 的 sign
- 翻新只改 affine，不改 mask 数据本身
- 必须跳过 ct.nii.gz 本身，不能把基准也覆盖
- 如果缺少算法细节或写回范围的确定性，planner 应明确保留该不确定性，而不是把任务塌缩成“直接复制 CT affine 到所有文件”
gold_relevant_files:
- <dataset_root>/totalseg/<patient_id>/ct.nii.gz
- <dataset_root>/totalseg/<patient_id>/*.nii.gz (除 ct.nii.gz)
gold_algorithm_reference: "def qr_clean_affine(affine):\n    R = affine[:3, :3]\n    t = affine[:3, 3]\n    spacing = np.linalg.norm(R, axis=0)\n    normalized_R = R / spacing\n    Q, _ = np.linalg.qr(normalized_R)\n    cleaned = np.eye(4)\n    cleaned[:3, :3] = Q * spacing\n    cleaned[:3, 3] = t\n    return cleaned\n\ndef correct_affine_sign(ref_affine, cleaned_affine):\n    signs = np.sign(ref_affine[:3, :3])\n    R_corrected = np.abs(cleaned_affine[:3, :3]) * signs\n    new_affine = np.eye(4)\n    new_affine[:3, :3] = R_corrected\n    new_affine[:3, 3] = ref_affine[:3, 3]\n    return new_affine\n"
v1_seed_spec:
  source: human_drafted_pilot
  status: needs_review
  spec_text: '任务：affine 一致化。


    对每个 <dataset_root>/totalseg/<patient_id>/：

    - 读 ct.nii.gz 的 affine

    - 把这个 affine 应用到目录下其他 mask 文件


    并行跑，tqdm 显示进度。


    [planner v1 注意：本 spec 故意省略 QR 清理和符号修正这两步，

    也没有任何 "破坏性操作 / 备份建议" 的风险提示。

    一个好 worker 应该追问算法细节并提示备份。]

    '
expected_v1_pitfalls:
- 'Omit or blur critical constraint: QR 清理流程：normalize R 矩阵 → QR 分解取 Q → Q × 原 spacing 重建 R'
- 'Omit or blur critical constraint: 符号修正：用原 ct affine 的 sign 矩阵覆盖 cleaned affine 的 sign'
- 'Omit or blur critical constraint: 翻新只改 affine，不改 mask 数据本身'
- 'Collapse the task into a generic shortcut such as "copy CT affine onto every file" without preserving QR cleanup + sign correction as the real boundary'
decoys:
- Worker may fill in a plausible implementation default that the planner did not actually specify.
- Worker may treat a visible path or schema summary as complete when it is only partial.
forbidden_assumptions:
- Do not infer hidden file naming, merge semantics, resume markers, or destructive write policy unless the planner spec states them.
- Do not reward or punish backup policy, missing-CT warning behavior, or tqdm/progress details unless they replace or distort the core affine-boundary constraints.
judge_only_rubric:
  critical_constraints_min_for_acceptable: 3
  critical_constraints_min_for_strong: 4
  score_caps:
    max_spec_score_if_no_gold_constraint_captured: 3
    max_spec_score_if_forbidden_assumption_introduced: 5
    max_worker_score_if_missing_info_empty_under_weak_spec: 6
  positive_signals:
  - Planner states the real affine boundary concretely: QR cleanup, sign correction, non-CT-only propagation, and affine-only rewrite.
  - Planner keeps the worker away from the generic shortcut of blindly copying CT affine to all files.
  - Planner separates grounded affine constraints from implementation details that are still uncertain.
  - Worker preserves the planner intent while identifying missing implementation details.
  negative_signals:
  - Planner introduces a convenient but wrong default, especially collapsing the task into a direct affine copy without QR cleanup or sign correction.
  - Planner spends effort on backup/progress/policy trivia while leaving the affine-cleaning boundary vague.
  - Worker treats an underspecified handoff as complete.
  - Worker first actions target files or transformations not grounded in the planner spec.
