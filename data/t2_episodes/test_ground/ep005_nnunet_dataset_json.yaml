episode_id: ep005_nnunet_dataset_json
project_id: pp_pipeline
context_type: config_generation_script
planner_input:
  request_text: "我准备用 nnU-Net 训一个肺右下叶分割。\n数据已经按 nnU-Net v2 的目录结构放好了：\n\n<dataset_root>/Dataset001_LungLobeRight/\n  imagesTr/\n  labelsTr/\n  imagesTs/\n\n请写个脚本生成 dataset.json。\n单类前景：lung_lower_lobe_right。\n模态是 DRR（不是 CT）。\n\n这份 spec 里需要明确 nnU-Net v2 dataset.json 的 schema 字段、训练图像和标签的 case_id 对齐规则、测试集是否进入 JSON、路径应该怎么写、文件后缀应该怎么处理；如果你不确定某个 v2 细节，不要沿用旧版默认，直接列成 open question。\n"
  design_summary: '一次性配置生成，扫描 imagesTr / labelsTr / imagesTs 三个目录，

    按 nnU-Net v2 schema 生成 dataset.json。

    已确认的 v2 schema 细节：channel_name 是字符串 key 的 dict；labels 的 key 也用字符串；
    training/test 路径写成 ./imagesTr/、./labelsTr/、./imagesTs/ 相对路径；
    dataset.json 需要 file_ending: .nii.gz；不要写 tensorImageSize。

    '
  repo_summary:
    modules:
    - '<dataset_root>/Dataset001_LungLobeRight/imagesTr/: 训练图像，nnU-Net 命名规范'
    - '<dataset_root>/Dataset001_LungLobeRight/labelsTr/: 训练标签'
    - '<dataset_root>/Dataset001_LungLobeRight/imagesTs/: 测试图像'
    notes:
    - nnU-Net v2，不是 v1（schema 有重大差异）
    - 图像格式是 .nii.gz
    - 单 channel（DRR 是 2D 灰度图，但用 nii.gz 包装成 nnU-Net 兼容格式）
    - 训练图像 case_id 来自去掉 _0000.nii.gz；labelsTr 使用同名 <case_id>.nii.gz
    - imagesTs 进入 test 列表，但不需要对应 label
  file_index:
  - <dataset_root>/Dataset001_LungLobeRight/imagesTr/case_001_0000.nii.gz
  - <dataset_root>/Dataset001_LungLobeRight/imagesTr/case_002_0000.nii.gz
  - <dataset_root>/Dataset001_LungLobeRight/labelsTr/case_001.nii.gz
  - <dataset_root>/Dataset001_LungLobeRight/labelsTr/case_002.nii.gz
  - <dataset_root>/Dataset001_LungLobeRight/imagesTs/case_101_0000.nii.gz
worker_prompt_template_version: v1_structured_interpretation
worker_expected_fields:
- understood_goal
- constraints_to_follow
- information_still_missing
- first_3_concrete_actions
judge_spec: data/t2_episodes/test_ground/judges/ep005_nnunet_dataset_json.judge.yaml
