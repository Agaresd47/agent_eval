episode_id: ep003_totalseg_whitelist_split
project_id: pp_pipeline
context_type: file_management_script
planner_input:
  request_text: |
    TotalSeg 输出每个病人 100+ 个结构 mask，但这条线后面训练只保留：
    心脏相关、肺叶、肋骨、胸椎（T 段）、锁骨、肱骨、胸骨、主动脉。

    请帮我写一个 worker-ready spec：
    对每个病人目录，把**不在白名单内**的 mask 文件搬到另一个目录留存，
    源目录只保留白名单内的文件。

    源：<dataset_root>/totalseg_output/<patient_id>/
    分流目标：<archive_root>/<patient_id>/

    这份 spec 里需要明确：
    - 白名单匹配到底按“类别 / 前缀”还是按“精确文件名”
    - 分流动作是 move、delete 还是 copy
    - 目标目录结构怎么镜像
    - 缺失文件怎么处理

    病人级独立，可并行。漏文件要记录但不要中断。
  design_summary: |
    白名单驱动的文件分流，不是清空重建。

    archive 目录镜像被搬走的文件；源目录被瘦身后仍要保留白名单内文件。
    worker 不应把“心脏 / 肺 / 肋骨 / 胸椎”这类类别词直接当成可执行的文件匹配规则。
  repo_summary:
    modules:
      - "<dataset_root>/totalseg_output/<patient_id>/: 每个病人一个平铺目录，全部是 .nii.gz"
      - "<archive_root>/<patient_id>/: 空目录，将镜像被搬走的文件"
      - "<workspace>/whitelist_notes.md: 只有类别范围和少量示例文件名，不能直接当成完整可执行白名单"
    notes:
      - "命名是 TotalSeg 固定文件名，不是任意前缀；例如 rib_left_1.nii.gz 和 rib_left_10.nii.gz 都存在"
      - "whitelist_notes.md 只够说明“关心哪些解剖类别”和少量反例，不够推出完整精确白名单"
      - "可见样例里故意放了“看起来很像但 whitelist 决策不同”的文件名对；不要把这些样例当成可展开的模式规则"
      - "胸椎只保留 vertebrae_T2..T12，不保留 cervical / lumbar"
      - "archive 是留存分流结果，不是垃圾桶；不要把任务理解成 delete"
      - "缺失文件应该记日志，但不因为单个病人不完整而中断全局处理"
  file_index:
    - "<dataset_root>/totalseg_output/case_aa01/aorta.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/heart.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/heart_atrium_left.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/lung_lower_lobe_right.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/rib_left_1.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/rib_left_10.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/vertebrae_T5.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/vertebrae_C3.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/kidney_left.nii.gz"
    - "<dataset_root>/totalseg_output/case_aa01/spleen.nii.gz"
    - "<archive_root>/case_aa01/"
    - "<workspace>/whitelist_notes.md"
worker_prompt_template_version: v1_structured_interpretation
worker_expected_fields:
  - understood_goal
  - constraints_to_follow
  - information_still_missing
  - first_3_concrete_actions
judge_spec: data/t2_episodes/test_ground/judges/ep003_totalseg_whitelist_split.judge.yaml
