episode_id: ep001_ct_mask_combine
project_id: pp_pipeline
context_type: data_preprocessing_script
planner_input:
  request_text: '我有一批病人 CT，每个病人在 <dataset_root>/ct/ 下有一个 <patient_id>.nii.gz，

    在 <dataset_root>/mask/<patient_id>_total/ 下有 TotalSeg 输出的若干结构 mask。


    请帮我对每个病人做：

    1. 把同一类的多个结构 mask 合成一个二值 mask（比如所有 rib_left_* 和 rib_right_* 合成一个 rib mask）

    2. 用 CT 的强度填到 mask 区域，得到 "real-intensity mask"

    3. 把所有结构合在一起作为前景，剩下的体素当作软组织 CT 输出一份


    要支持中途崩溃后续跑。多机会跑很多病人，速度优先。

    这份 spec 里需要把几个实现类别说清楚：mask 合并到底采用什么数学语义、结构文件如何被选择、续跑完成状态如何判定、real-intensity 和软组织 CT 的背景/填充值如何处理。

    输出到 <output_root>/<patient_id>/ 下。

    '
  design_summary: '单脚本 + multiprocessing.Pool，按病人粒度并行。

    续跑通过病人输出目录下的 .processing_done flag 文件判定。

    '
  repo_summary:
    modules:
    - '<dataset_root>/ct/<patient_id>.nii.gz: CT volumes, NIfTI'
    - '<dataset_root>/mask/<patient_id>_total/: TotalSeg outputs, ~100 .nii.gz per patient'
    - '<output_root>/: empty, will mirror patient ids'
    notes:
    - 已有 nibabel 环境
    - 病人数大约 1000+，每个 CT ~200MB
    - 之前类似任务用 multiprocessing.Pool
  file_index:
  - <dataset_root>/ct/case_aa01.nii.gz
  - <dataset_root>/ct/case_aa02.nii.gz
  - <dataset_root>/mask/case_aa01_total/aorta.nii.gz
  - <dataset_root>/mask/case_aa01_total/heart.nii.gz
  - <dataset_root>/mask/case_aa01_total/heart_atrium_left.nii.gz
  - <dataset_root>/mask/case_aa01_total/rib_left_1.nii.gz
  - <dataset_root>/mask/case_aa01_total/rib_left_2.nii.gz
  - <dataset_root>/mask/case_aa01_total/lung_lower_lobe_left.nii.gz
  - <dataset_root>/mask/case_aa01_total/vertebrae_T5.nii.gz
worker_prompt_template_version: v1_structured_interpretation
worker_expected_fields:
- understood_goal
- constraints_to_follow
- information_still_missing
- first_3_concrete_actions
judge_spec: data/t2_episodes/test_ground/judges/ep001_ct_mask_combine.judge.yaml
