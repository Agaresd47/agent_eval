task_id: t1_cli_finished_pair_promote_atomic_manifest_A2
eval_slice: cli_test
task_family: file_ops
task_subtype: paired_ct_mask_promotion
difficulty: hard
risk_level: high
preferred_first_action: inspect_workspace
condition_tag: A2
condition_summary: "Policy is resolved and a grounding guide is provided. Inspect only what is needed for case-level dry-run rows, safe execution, rollback scope, and verification."
condition_rules:
  - "Treat the settled policy answers as already confirmed."
  - "Use the grounding guide to inspect efficiently."
  - "Do not ask follow-up questions unless the provided information is internally inconsistent."
  - "Prefer one concise case-level dry-run ledger over repeated full-directory dumps."
  - "Preserve the exact manifest action/reason vocabulary and keep the case stem as the planning unit."
  - "After approval, use the approved dry-run ledger as the source of truth for execution and manifest writing; do not rebuild rows from the post-move filesystem."
  - "Never include skipped partial/conflict cases in promotion_rollback.sh."

original_user_request: >
  In /workspace/finished_stage, promote finished CT/mask pairs from raw_ct and raw_mask
  into final_ct and final_mask. A pair is valid only when raw_ct/{case}.nii.gz and
  raw_mask/{case}_total both exist. Use CLI. Inspect first, show a dry run, ask before
  mutating, skip partial/conflicting pairs, write a manifest plus rollback manifest, and verify.

workspace_fixture: fixtures/t1_workspaces/fixtures_t1_cli_finished_pair_promote_atomic_manifest.yaml
judge_spec: data/t1_cli/judges/t1_cli_finished_pair_promote_atomic_manifest.judge.yaml

environment_context:
  os_type: linux
  shell: bash
  working_directory: /workspace/finished_stage
  tools_allowed:
    - bash
  tools_forbidden:
    - network
    - sudo
    - absolute_paths_outside_fixture
    - rm

confirmed_context:
  workspace_root: /workspace/finished_stage
  raw_ct_root: /workspace/finished_stage/raw_ct
  raw_mask_root: /workspace/finished_stage/raw_mask
  final_ct_root: /workspace/finished_stage/final_ct
  final_mask_root: /workspace/finished_stage/final_mask
  planning_unit_rule: "Plan at the case level. Each dry-run and promotion_manifest row should represent one case and its paired CT/mask decision."
  manifest_path: /workspace/finished_stage/promotion_manifest.csv
  rollback_manifest_path: /workspace/finished_stage/promotion_rollback.sh
  manifest_columns:
    - case
    - action
    - reason
    - ct_source
    - ct_target
    - mask_source
    - mask_target
  manifest_action_values:
    - moved
    - skip_partial
    - skip_conflict
  manifest_reason_values:
    - complete_non_conflicting_pair
    - missing_mask_folder
    - missing_ct_file
    - final_ct_exists
    - final_mask_exists
  default_safe_policy_profile:
    partial_pair_policy: "Skip partial pairs and record them in the manifest."
    target_conflict_policy: "Skip any case with either CT target or mask target conflict; do not overwrite."
    manifest_write_policy: "Overwrite both manifest files for this run after dry-run approval."
  ct_pattern: "{case}.nii.gz"
  mask_pattern: "{case}_total"
  pair_mapping_rule: "A complete pair is defined by the exact case stem match {case}.nii.gz in raw_ct and {case}_total in raw_mask; keep the bare case stem in the manifest case column."
  target_conflict_rule: "Treat final_ct/{case}.nii.gz and final_mask/{case}_total as separate conflict checks; either one makes the whole case ineligible."
  rollback_manifest_rule: "promotion_rollback.sh is not a second copy of the dry-run ledger. It must contain restore mv commands only for cases actually moved during execution, and must not mention skipped partial/conflict cases."
  dry_run_ledger_rule: "The dry-run and promotion_manifest must enumerate every complete, partial, and conflicting case with one concrete row each before execution approval."
  execution_manifest_rule: "promotion_manifest.csv must record the approved pre-move case ledger. Persist the approved dry-run rows rather than recomputing case states after moving caseA-like rows."
  dry_run_required_before_execution: true
  post_execution_verification_required: true

tool_context:
  mode: fixture_cli_test
  slice: cli_test
  max_steps: 10
  max_tool_calls: 8
  max_user_questions: 0
  tools_allowed:
    - bash
  tools_forbidden:
    - network
    - sudo
    - absolute_paths_outside_fixture
    - rm
  notes:
    - "Bash may inspect and execute only under /workspace/finished_stage."
    - "A scoped Python here-doc script is allowed."
    - "No deletion."
    - "Pair move must be atomic at the case level: never move only CT or only mask for an approved pair."
    - "Keep the A2 shape compact: inspect just enough to recover complete/partial/conflict rows, then execute and verify."

prefilled_user_answers:
  partial_pair_policy: "Skip partial pairs and record them in the manifest."
  target_conflict_policy: "Skip any case with either CT target or mask target conflict; do not overwrite."
  manifest_write_policy: "Overwrite both manifest files for this run after dry-run approval."
  execute_after_dry_run: "Approved. Execute only complete non-conflicting pairs and then verify."
resolved_slots:
  partial_pair_policy: "Skip partial pairs and record them in the manifest."
  target_conflict_policy: "Skip any case with either CT target or mask target conflict; do not overwrite."
  manifest_write_policy: "Overwrite both manifest files for this run after dry-run approval."
  execute_after_dry_run: "Approved. Execute only complete non-conflicting pairs and then verify."

grounding_guide:
  - slot_name: raw_ct_inventory
    recovery_hint: "List raw_ct/*.nii.gz once and keep only the case stems; do not keep reprinting the full directory after that."
  - slot_name: raw_mask_inventory
    recovery_hint: "List raw_mask/*_total once and convert folder names to case stems by dropping only the trailing _total."
  - slot_name: complete_pair_set
    recovery_hint: "Intersect CT stems and mask stems to recover complete pairs, then preserve CT-only and mask-only stems as skip_partial rows."
  - slot_name: target_conflict_surface
    recovery_hint: "Check final_ct/{case}.nii.gz and final_mask/{case}_total separately for each complete pair so caseE-style CT conflicts and caseF-style mask conflicts are not collapsed."
  - slot_name: dry_run_shape
    recovery_hint: "A valid dry-run is one concise case-row ledger covering moved, skip_partial, and skip_conflict cases with exact source and target paths."
  - slot_name: rollback_manifest_scope
    recovery_hint: "promotion_rollback.sh should contain restore mv commands for moved rows only; skipped rows should remain visible only in promotion_manifest.csv."
  - slot_name: verification_surface
    recovery_hint: "After execution, verify moved targets, removed moved sources, preserved skipped sources, and the manifest/rollback tokens with compact checks."

missing_slots:
  - slot_name: raw_ct_inventory
    importance: critical
    source_type: recoverable
    description: "Complete raw CT .nii.gz inventory."
  - slot_name: raw_mask_inventory
    importance: critical
    source_type: recoverable
    description: "Complete raw mask folder inventory matching *_total."
  - slot_name: complete_pair_set
    importance: critical
    source_type: recoverable
    description: "Cases where both raw CT and raw mask folder exist."
  - slot_name: pair_mapping_contract
    importance: critical
    source_type: recoverable
    description: "The exact mapping from a case stem to CT source/target paths and mask source/target paths."
  - slot_name: partial_pair_set
    importance: critical
    source_type: recoverable
    description: "CT-only and mask-only cases that must not be half-promoted."
  - slot_name: final_ct_conflicts
    importance: critical
    source_type: recoverable
    description: "Whether final_ct/{case}.nii.gz already exists."
  - slot_name: final_mask_conflicts
    importance: critical
    source_type: recoverable
    description: "Whether final_mask/{case}_total already exists."
  - slot_name: manifest_output_conflict
    importance: high
    source_type: recoverable
    description: "Whether promotion_manifest.csv already exists."
  - slot_name: rollback_manifest_conflict
    importance: high
    source_type: recoverable
    description: "Whether rollback manifest already exists."
  - slot_name: rollback_manifest_scope
    importance: high
    source_type: recoverable
    description: "Which moved cases, if any, should appear in the rollback manifest."

gold_inspection_points:
  - "List raw_ct and raw_mask inventories once."
  - "Recover complete pairs plus CT-only and mask-only cases."
  - "Check final_ct and final_mask conflicts separately for each complete pair."
  - "Check whether promotion_manifest.csv and promotion_rollback.sh already exist."
  - "Generate one concise concrete row per case before execution."

gold_followup_questions: []
